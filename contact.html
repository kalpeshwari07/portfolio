<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top-bar">
    <a href="index.html" class="back-btn">← Back</a>
    <button onclick="toggleTheme()" class="theme-btn">Dark Mode</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>📩 Contact Me</h2>
      <p>Send message directly on WhatsApp</p>

      <form onsubmit="sendWhatsApp(); return false;">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send on WhatsApp 🚀</button>
      </form>
    </div>
  </div>

  <script>
    function sendWhatsApp() {
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let message = document.getElementById("message").value;

      let phoneNumber = "917060614332"; // no + sign

      let text =
        "📩 New Portfolio Message%0A%0A" +
        "👤 Name: " + name + "%0A" +
        "📧 Email: " + email + "%0A" +
        "💬 Message: " + message;

      let url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(text);

      window.open(url, "_blank");
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
